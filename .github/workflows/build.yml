name: build-poc

# Compila la app para macOS (universal) y Windows, y sube los instaladores
# como artefactos descargables. Para la PoC: sin firma de código (los usuarios
# verán aviso de "desarrollador no identificado", aceptable para prueba interna).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend deps
        working-directory: app
        run: npm install

      # Firma macOS: para instalación limpia "arrastrar y listo" (sin warnings),
      # se necesita cuenta Apple Developer. Cuando la tengas, agrega los secrets
      # APPLE_* al repo y descomenta el bloque `env` de abajo. Sin eso, la PoC
      # compila SIN firmar (se abre con clic-derecho → Abrir la primera vez).
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: scotia-dashboard-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            app/src-tauri/target/**/release/bundle/dmg/*.dmg
            app/src-tauri/target/**/release/bundle/nsis/*.exe
            app/src-tauri/target/**/release/bundle/msi/*.msi
